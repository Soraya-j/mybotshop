controller_manager:
  ros__parameters:
    update_rate: 100 # Hz
    use_sim_time: true

    joint_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_effort_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

velocity_controller:
  ros__parameters:
    joints:
      - FL_foot_fixed
      - FR_foot_fixed
      - RL_foot_fixed
      - RR_foot_fixed
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity

joint_effort_controller:
  ros__parameters:
    joints:
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    gains:
      FL_hip_joint      : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      FL_thigh_joint    : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      FL_calf_joint     : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      FR_hip_joint      : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      FR_thigh_joint    : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      FR_calf_joint     : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      RL_hip_joint      : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      RL_thigh_joint    : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      RL_calf_joint     : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      RR_hip_joint      : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      RR_thigh_joint    : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      RR_calf_joint     : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      
joint_position_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - gripper
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    gains:
      joint1            : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      joint2            : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      joint3            : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      joint4            : {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}
      gripper:           {p: 100.0, i: 0.1, d: 1.2, i_clamp: 2.5}