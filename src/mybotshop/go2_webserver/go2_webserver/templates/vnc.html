<html>

<head>
    <title>VNC - Robot Webserver</title>
    <link rel="icon" href="../static/media/logos/mbs_logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="../static/styles.css" type="text/css" />
    <link rel="stylesheet" href="../static/css/all.min.css" type="text/css" /> <!-- Font Awesome -->
    <script src="../static/scripts/common_script.js" defer></script>
    <script type="module" src="../static/scripts/vnc_script.js" defer></script>
    <script src="../static/scripts/circuitry_background_script.js" defer></script>
</head>

<body>
    <!-- Navbar -->
    <div class="navbar"></div>

    <!-- Circuitry Background -->
    <canvas id="circuitCanvas"></canvas>

    <!-- Background Media -->
    <div class="background-media">
        <img src="../static/media/wallpaper/wallpaper.webp" alt="Background GIF">
    </div>

    <!-- Main Panels -->
    <div class="container">
        <!-- VNC Viewer Card -->
        <div class="console-card vnc-card">
            <div class="console-card-header">
                <i class="fas fa-desktop"></i>
                <span>VNC Remote Desktop</span>
                <div id="vnc-status" class="vnc-status-badge">Disconnected</div>
            </div>
            <div class="console-card-content">
                <div class="vnc-container">
                    <div id="vnc-screen"></div>
                    <div class="vnc-controls">
                        <label>VNC:</label>
                        <i class="fas fa-server"></i>
                        <input type="text" id="vnc-host" placeholder="VNC Host IP">

                        <label>Port:</label>
                        <i class="fas fa-network-wired"></i>
                        <input type="text" id="vnc-port" value="6080" placeholder="6080">

                        <label>Password:</label>
                        <i class="fas fa-lock"></i>
                        <input type="password" id="vnc-password" value="mybotshop" placeholder="mybotshop">

                        <label for="vnc-clipboard-text">Clipboard:</label>
                        <textarea id="vnc-clipboard-text" rows="1" placeholder="Copy - Paste"></textarea>
                        <button id="vnc-clipboard-send-btn" class="vnc-btn vnc-btn-action">
                            <i class="fas fa-paste"></i>
                        </button>

                        <button id="vnc-restart-btn" class="vnc-btn vnc-btn-restart">
                            <i class="fas fa-sync-alt"></i>
                        </button>

                        <div class="vnc-connect-group">
                            <button id="vnc-connect-btn" class="vnc-btn vnc-btn-connect">
                                <i class="fas fa-plug"></i>
                            </button>
                            <button id="vnc-disconnect-btn" class="vnc-btn vnc-btn-disconnect">
                                <i class="fas fa-stop"></i>
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer_"></div>
</body>

</html>
