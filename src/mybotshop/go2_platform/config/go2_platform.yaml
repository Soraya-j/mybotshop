/**:
  ros__parameters:

    robot_odom_pub: True
    robot_odom_tf: 'odom'
    robot_baselink_tf: 'base_link'
    lan_port: 'eth0'

    target_frame: 'lidar_link'
    pcd_sub: 'utlidar/cloud'
    scan_pub: 'scan'
    min_height: 0.1
    max_height: 0.3
    scan_time: 0.005
    range_min: 0.0
    range_max: 10.0
    use_inf: True
    inf_epsilon: 1.0
    angle_increment: 0.01
    transform_tolerance: 0.1
    accumulation_window: 0.5
    voxel_leaf_size: 0.03
    publisher_frequency: 60

    multicast_group: "230.1.1.1"      # Multicast address for Go2 video stream
    port: 1720                         # UDP port for video stream
    
    # Video Processing
    decoder: "avdec_h264"              # H.264 decoder (try: nvh264dec, vaapih264dec for HW acceleration)
    
    # Publishing Options
    image_topic: "sensor/camera_raw"   # Base topic for raw images
    frame_id: "camera_link"            # TF frame for camera
    publish_raw: true                  # Publish uncompressed images
    publish_compressed: true           # Publish JPEG compressed images
    
    # Compression Settings
    jpeg_quality: 85                   # JPEG quality (1-100, higher = better quality)
    
    # Performance Tuning
    qos_depth: 1                       # Queue depth (1 = latest only)
    drop_old: true                     # Drop old frames to reduce latency
    sync: false                        # Keep false for live streaming
    latency_ms: 10                     # Jitter buffer latency (0-30ms typical)
    
    # Camera Info (will be loaded from config/go2_cam.yaml if available)
    # If calibration file not found, default parameters will be used