controller_names:
  - open_manipulator/joint_trajectory_controller
  - open_manipulator/velocity_controller
  - open_manipulator/gripper_controller

open_manipulator/joint_trajectory_controller:
  type: FollowJointTrajectory
  action_ns: follow_joint_trajectory
  default: true
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
    # - gripper

open_manipulator/gripper_controller:
  type: FollowJointTrajectory
  action_ns: follow_joint_trajectory
  default: true
  joints:
    - gripper

open_manipulator/velocity_controller:
  joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - gripper